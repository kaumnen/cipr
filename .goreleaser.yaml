version: 2

before:
  hooks:
    - go mod tidy

builds:
  - ldflags:
      - "-s -w -X github.com/kaumnen/cipr/cmd.version={{ .Env.VERSION }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: kaumnen
    name: cipr

brews:
  - homepage: https://github.com/kaumnen/cipr
    repository:
      owner: kaumnen
      name: homebrew-tap

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
